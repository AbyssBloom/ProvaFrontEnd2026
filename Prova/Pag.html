<header>

  <nav>

  </nav>
</header>

<main>

  <section class="cards">
    <div class="card">
      <h2>Card 1</h2>
      <p>Conteúdo de exemplo para o card.</p>
      <button onclick="clicarCard(1)">Clique</button>
    </div>

    <div class="card">
      <h2>Card 2</h2>
      <p>Outro conteúdo de exemplo.</p>
      <button onclick="clicarCard(2)">Clique</button>
    </div>

    <div class="card">
      <h2>Card 3</h2>
      <p>Mais um exemplo de card.</p>
      <button onclick="clicarCard(3)">Clique</button>
    </div>
  </section>

  <section class="form">
    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="enviar()">Enviar</button>
  </section>

  <p id="mensagem"></p>

</main>
